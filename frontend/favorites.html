<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的收藏 - 观影系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }
        .navbar {
            background-color: #0c0c0c;
        }
        .section-title {
            border-left: 4px solid #0d6efd;
            padding-left: 12px;
            margin: 30px 0 20px 0;
            font-weight: 600;
        }
        .movie-card {
            transition: transform 0.3s, box-shadow 0.3s;
            margin-bottom: 20px;
            border: none;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            overflow: hidden;
        }
        .movie-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 16px rgba(0, 0, 0, 0.2);
        }
        .movie-card img {
            height: 300px;
            object-fit: cover;
        }
        .card-body {
            padding: 15px;
        }
        .card-title {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .rating-stars {
            color: #fd7e14;
        }
        .genre-tag {
            display: inline-block;
            background-color: #e9ecef;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            margin-right: 5px;
            margin-bottom: 5px;
            color: #495057;
        }
        .footer {
            background-color: #212529;
            color: #fff;
            padding: 40px 0;
            margin-top: 50px;
        }
        .empty-state {
            text-align: center;
            padding: 80px 20px;
        }
        .empty-state i {
            font-size: 4rem;
            color: #dee2e6;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="../index.html">
                <i class="bi bi-camera-reels me-2"></i>观影系统
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="../index.html">首页</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="favorites.html">我的收藏</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="records.html">观影记录</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="profile.html">个人中心</a>
                    </li>
                </ul>
                <div class="d-flex align-items-center">
                    <span class="text-light me-3" id="user-info"></span>
                    <button class="btn btn-outline-light btn-sm" id="logout-btn" style="display: none;">退出</button>
                    <a class="btn btn-outline-light btn-sm" href="login.html" id="login-btn">登录</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主要内容区 -->
    <div class="container py-4">
        <h3 class="section-title"><i class="bi bi-bookmark-heart me-2"></i>我的收藏</h3>
        
        <!-- 收藏列表 -->
        <div class="row" id="favorites-list">
            <!-- 收藏的电影将通过JavaScript动态加载 -->
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container text-center">
            <p class="mb-0">© 2023 观影系统. 保留所有权利.</p>
        </div>
    </footer>

    <!-- 电影详情模态框 -->
    <div class="modal fade" id="movieDetailModal" tabindex="-1" aria-labelledby="movieDetailModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="movieDetailModalLabel">电影详情</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="movie-detail-content">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
                    <button type="button" class="btn btn-primary"><i class="bi bi-play-circle me-1"></i>立即观看</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script>
        // API基础地址
        const API_BASE_URL = 'http://localhost:3000/api';

        // HTTP请求封装
        async function request(url, options = {}) {
            const token = localStorage.getItem('token');
            
            const headers = {
                'Content-Type': 'application/json',
                ...options.headers
            };
            
            if (token) {
                headers['Authorization'] = `Bearer ${token}`;
            }
            
            try {
                const response = await fetch(`${API_BASE_URL}${url}`, {
                    ...options,
                    headers
                });
                
                const data = await response.json();
                
                if (data.code === 401) {
                    localStorage.removeItem('token');
                    localStorage.removeItem('user');
                    window.location.href = 'login.html';
                }
                
                return data;
            } catch (error) {
                console.error('API请求失败:', error);
                return { code: 500, message: '网络错误', data: null };
            }
        }

        // 观影相关API
        const watchAPI = {
            getFavorites: (params = {}) => {
                const query = new URLSearchParams(params).toString();
                return request(`/watch/favorites?${query}`);
            },
            removeFavorite: (movieId) => request(`/watch/favorites/${movieId}`, {
                method: 'DELETE'
            })
        };

        const movieAPI = {
            getDetail: (id) => request(`/movies/${id}`)
        };

        // 检查登录状态
        function checkAuth() {
            const token = localStorage.getItem('token');
            const userStr = localStorage.getItem('user');
            
            if (!token || !userStr) {
                window.location.href = 'login.html';
                return null;
            }
            
            return JSON.parse(userStr);
        }

        // 更新导航栏用户信息
        function updateNavbar(user) {
            const userInfo = document.getElementById('user-info');
            const logoutBtn = document.getElementById('logout-btn');
            const loginBtn = document.getElementById('login-btn');
            
            if (user) {
                userInfo.textContent = `欢迎, ${user.nickname || user.username}`;
                logoutBtn.style.display = 'inline-block';
                loginBtn.style.display = 'none';
            } else {
                userInfo.textContent = '';
                logoutBtn.style.display = 'none';
                loginBtn.style.display = 'inline-block';
            }
        }

        // 生成星级评分
        function generateStars(rating) {
            let stars = '';
            const fullStars = Math.floor(rating);
            const hasHalfStar = rating % 1 >= 0.5;
            
            for (let i = 0; i < fullStars; i++) {
                stars += '<i class="bi bi-star-fill"></i>';
            }
            
            if (hasHalfStar) {
                stars += '<i class="bi bi-star-half"></i>';
            }
            
            const emptyStars = 5 - fullStars - (hasHalfStar ? 1 : 0);
            for (let i = 0; i < emptyStars; i++) {
                stars += '<i class="bi bi-star"></i>';
            }
            
            return stars;
        }

        // 渲染电影卡片
        function renderMovieCard(movie) {
            const rating = movie.rating || 0;
            const stars = generateStars(rating);
            const genres = movie.Genres ? movie.Genres.map(g => `<span class="genre-tag">${g.name}</span>`).join('') : '';
            const poster = movie.poster || 'https://via.placeholder.com/300x450?text=No+Image';
            
            return `
                <div class="col-xl-3 col-lg-4 col-md-6">
                    <div class="card movie-card">
                        <img src="${poster}" class="card-img-top" alt="${movie.title}" onerror="this.src='https://via.placeholder.com/300x450?text=No+Image'">
                        <div class="card-body">
                            <h5 class="card-title">${movie.title}</h5>
                            <div class="rating-stars mb-2">
                                ${stars}
                                <span class="ms-1">${rating.toFixed(1)}</span>
                            </div>
                            <div class="mb-2">${genres}</div>
                            <div class="d-flex justify-content-between align-items-center">
                                <a href="#" class="btn btn-sm btn-outline-primary view-detail" data-movie-id="${movie.id}">查看详情</a>
                                <button class="btn btn-sm btn-outline-danger remove-favorite" data-movie-id="${movie.id}" title="取消收藏">
                                    <i class="bi bi-bookmark-x"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // 显示加载状态
        function showLoading() {
            document.getElementById('favorites-list').innerHTML = `
                <div class="col-12 text-center py-5">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">加载中...</span>
                    </div>
                    <p class="mt-2 text-muted">正在加载收藏列表...</p>
                </div>
            `;
        }

        // 显示空状态
        function showEmpty() {
            document.getElementById('favorites-list').innerHTML = `
                <div class="col-12">
                    <div class="empty-state">
                        <i class="bi bi-bookmark"></i>
                        <h4 class="mt-3 text-muted">暂无收藏</h4>
                        <p class="text-muted">去首页发现喜欢的电影吧</p>
                        <a href="../index.html" class="btn btn-primary mt-2">浏览电影</a>
                    </div>
                </div>
            `;
        }

        // 显示错误
        function showError(message) {
            document.getElementById('favorites-list').innerHTML = `
                <div class="col-12 text-center py-5">
                    <i class="bi bi-exclamation-triangle text-warning fs-1"></i>
                    <p class="mt-2 text-danger">${message}</p>
                    <button class="btn btn-sm btn-outline-primary" onclick="loadFavorites()">重试</button>
                </div>
            `;
        }

        // 加载收藏列表
        async function loadFavorites() {
            showLoading();
            
            try {
                const result = await watchAPI.getFavorites({ page: 1, limit: 20 });
                
                if (result.code === 200 && result.data) {
                    const favorites = result.data.favorites || result.data;
                    
                    if (favorites && favorites.length > 0) {
                        document.getElementById('favorites-list').innerHTML = favorites.map(fav => {
                            const movie = fav.Movie || fav;
                            return renderMovieCard(movie);
                        }).join('');
                    } else {
                        showEmpty();
                    }
                } else {
                    showError(result.message || '加载失败');
                }
            } catch (error) {
                showError('网络错误，请检查后端服务');
            }
        }

        // 取消收藏
        async function removeFavorite(movieId) {
            if (!confirm('确定要取消收藏吗？')) return;
            
            try {
                const result = await watchAPI.removeFavorite(movieId);
                
                if (result.code === 200) {
                    showMessage('已取消收藏', 'success');
                    loadFavorites();
                } else {
                    showMessage(result.message || '操作失败', 'danger');
                }
            } catch (error) {
                showMessage('网络错误', 'danger');
            }
        }

        // 显示电影详情
        async function showMovieDetail(movieId) {
            try {
                const result = await movieAPI.getDetail(movieId);
                
                if (result.code === 200 && result.data) {
                    const movie = result.data;
                    const rating = movie.rating || 0;
                    const stars = generateStars(rating);
                    const genres = movie.Genres ? movie.Genres.map(g => `<span class="badge bg-secondary me-1">${g.name}</span>`).join('') : '';
                    const year = movie.release_date ? new Date(movie.release_date).getFullYear() : '未知';
                    
                    document.getElementById('movieDetailModalLabel').textContent = movie.title;
                    document.getElementById('movie-detail-content').innerHTML = `
                        <div class="row">
                            <div class="col-md-4">
                                <img src="${movie.poster || 'https://via.placeholder.com/300x450?text=No+Image'}" class="img-fluid rounded" alt="${movie.title}">
                            </div>
                            <div class="col-md-8">
                                <h4>${movie.title} (${year})</h4>
                                <div class="rating-stars mb-2">
                                    ${stars}
                                    <span class="ms-1">${rating.toFixed(1)}</span>
                                </div>
                                <p class="mb-2"><strong>导演:</strong> ${movie.director || '未知'}</p>
                                <p class="mb-2"><strong>类型:</strong> ${genres || '未知'}</p>
                                <p class="mb-2"><strong>时长:</strong> ${movie.duration ? movie.duration + '分钟' : '未知'}</p>
                                <p><strong>简介:</strong> ${movie.description || '暂无简介'}</p>
                            </div>
                        </div>
                    `;
                    
                    const movieModal = new bootstrap.Modal(document.getElementById('movieDetailModal'));
                    movieModal.show();
                }
            } catch (error) {
                showMessage('网络错误', 'danger');
            }
        }

        // 初始化页面
        document.addEventListener('DOMContentLoaded', function() {
            const user = checkAuth();
            if (user) {
                updateNavbar(user);
                loadFavorites();
            }
            
            // 退出登录
            document.getElementById('logout-btn').addEventListener('click', function() {
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                window.location.href = 'login.html';
            });
            
            // 事件委托
            document.addEventListener('click', function(e) {
                // 查看详情
                if (e.target.classList.contains('view-detail') || e.target.closest('.view-detail')) {
                    e.preventDefault();
                    const movieId = parseInt(e.target.closest('.view-detail').getAttribute('data-movie-id'));
                    showMovieDetail(movieId);
                }
                
                // 取消收藏
                if (e.target.classList.contains('remove-favorite') || e.target.closest('.remove-favorite')) {
                    e.preventDefault();
                    const button = e.target.classList.contains('remove-favorite') ? e.target : e.target.closest('.remove-favorite');
                    const movieId = parseInt(button.getAttribute('data-movie-id'));
                    removeFavorite(movieId);
                }
            });
        });
    </script>
</body>
</html>
