<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>观影系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }
        .navbar {
            background-color: #0c0c0c;
        }
        .section-title {
            border-left: 4px solid #0d6efd;
            padding-left: 12px;
            margin: 30px 0 20px 0;
            font-weight: 600;
        }
        .movie-card {
            transition: transform 0.3s, box-shadow 0.3s;
            margin-bottom: 20px;
            border: none;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            overflow: hidden;
        }
        .movie-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 16px rgba(0, 0, 0, 0.2);
        }
        .movie-card img {
            height: 300px;
            object-fit: cover;
        }
        .card-body {
            padding: 15px;
        }
        .card-title {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .rating-stars {
            color: #fd7e14;
        }
        .recommendation-reason {
            font-size: 0.85rem;
            color: #6c757d;
            margin-bottom: 12px;
        }
        .badge {
            font-size: 0.7rem;
            z-index: 1;
        }
        .search-container {
            background-color: #fff;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            margin-bottom: 30px;
        }
        .filter-btn {
            margin-right: 8px;
            margin-bottom: 8px;
        }
        .footer {
            background-color: #212529;
            color: #fff;
            padding: 40px 0;
            margin-top: 50px;
        }
        .genre-tag {
            display: inline-block;
            background-color: #e9ecef;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            margin-right: 5px;
            margin-bottom: 5px;
            color: #495057;
        }
    </style>
</head>

                        <a class="nav-link" href="frontend/favorites.html">我的收藏</a>
                    </li>

                        <a class="nav-link" href="frontend/records.html">观影记录</a>

        <!-- 为你推荐 -->

    <!-- 页脚 -->

            <div class="row">
                <div class="col-md-4">

                </div>

    <!-- 电影详情模态框 -->
    <div class="modal fade" id="movieDetailModal" tabindex="-1" aria-labelledby="movieDetailModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="movieDetailModalLabel">电影详情</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="movie-detail-content">
                    <!-- 电影详情内容将通过JavaScript动态加载 -->
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
                    <button type="button" class="btn btn-primary"><i class="bi bi-play-circle me-1"></i>立即观看</button>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="frontend/js/api.js"></script>
    <script>
        // API基础地址
        const API_BASE_URL = 'http://localhost:3000/api';

        // HTTP请求封装
        async function request(url, options = {}) {
            const token = localStorage.getItem('token');
            
            const headers = {
                'Content-Type': 'application/json',
                ...options.headers
            };
            
            if (token) {
                headers['Authorization'] = `Bearer ${token}`;
            }
            
            try {
                const response = await fetch(`${API_BASE_URL}${url}`, {
                    ...options,
                    headers
                });
                
                const data = await response.json();
                
                if (data.code === 401) {
                    localStorage.removeItem('token');
                    localStorage.removeItem('user');
                    window.location.href = 'frontend/login.html';
                }
                
                return data;
            } catch (error) {
                console.error('API请求失败:', error);
                return { code: 500, message: '网络错误，请检查后端服务是否启动', data: null };
            }
        }

        // 电影相关API
        const movieAPI = {
            getList: (params = {}) => {
                const query = new URLSearchParams(params).toString();
                return request(`/movies?${query}`);
            },
            getDetail: (id) => request(`/movies/${id}`),
            getHot: (limit = 10) => request(`/movies/hot?limit=${limit}`)
        };

        // 观影相关API
        const watchAPI = {
            addFavorite: (movieId) => request('/watch/favorites', {
                method: 'POST',
                body: JSON.stringify({ movieId })
            }),
            removeFavorite: (movieId) => request(`/watch/favorites/${movieId}`, {
                method: 'DELETE'
            }),
            checkFavorite: (movieId) => request(`/watch/favorites/check/${movieId}`)
        };

        // 渲染电影卡片
        function renderMovieCard(movie, isHot = false, rank = 0) {
            const rating = movie.rating || 0;
            const stars = generateStars(rating);
            const genres = movie.Genres ? movie.Genres.map(g => `<span class="genre-tag">${g.name}</span>`).join('') : '';
            const poster = movie.poster || 'https://via.placeholder.com/300x450?text=No+Image';
            
            return `
                <div class="col-xl-3 col-lg-4 col-md-6">
                    <div class="card movie-card">
                        ${isHot ? `<span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">${rank}</span>` : ''}
                        <img src="${poster}" class="card-img-top" alt="${movie.title}" onerror="this.src='https://via.placeholder.com/300x450?text=No+Image'">
                        <div class="card-body">
                            <h5 class="card-title">${movie.title}</h5>
                            <div class="rating-stars mb-2">
                                ${stars}
                                <span class="ms-1">${rating.toFixed(1)}</span>
                            </div>
                            <div class="mb-2">${genres}</div>
                            <div class="d-flex justify-content-between align-items-center">
                                <a href="#" class="btn btn-sm btn-outline-primary view-detail" data-movie-id="${movie.id}">查看详情</a>
                                <div>
                                    <button class="btn btn-sm btn-outline-secondary favorite-btn" data-movie-id="${movie.id}" title="收藏"><i class="bi bi-bookmark"></i></button>
                                    <button class="btn btn-sm btn-outline-success" title="观看"><i class="bi bi-play-circle"></i></button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // 生成星级评分
        function generateStars(rating) {
            let stars = '';
            const fullStars = Math.floor(rating);
            const hasHalfStar = rating % 1 >= 0.5;
            
            for (let i = 0; i < fullStars; i++) {
                stars += '<i class="bi bi-star-fill"></i>';
            }
            
            if (hasHalfStar) {
                stars += '<i class="bi bi-star-half"></i>';
            }
            
            const emptyStars = 5 - fullStars - (hasHalfStar ? 1 : 0);
            for (let i = 0; i < emptyStars; i++) {
                stars += '<i class="bi bi-star"></i>';
            }
            
            return stars;
        }

        // 显示加载状态
        function showLoading(containerId) {
            document.getElementById(containerId).innerHTML = `
                <div class="col-12 text-center py-5">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">加载中...</span>
                    </div>
                    <p class="mt-2 text-muted">正在加载数据...</p>
                </div>
            `;
        }

        // 显示错误信息
        function showError(containerId, message) {
            document.getElementById(containerId).innerHTML = `
                <div class="col-12 text-center py-5">
                    <i class="bi bi-exclamation-triangle text-warning fs-1"></i>
                    <p class="mt-2 text-danger">${message}</p>
                    <button class="btn btn-sm btn-outline-primary retry-btn">重试</button>
                </div>
            `;
        }

        // 加载推荐电影（调用真实API）
        async function loadPersonalRecommendations() {
            const container = document.getElementById('personal-recommendations');
            showLoading('personal-recommendations');
            
            try {
                const result = await movieAPI.getList({ page: 1, limit: 4 });
                
                if (result.code === 200 && result.data && result.data.movies) {
                    const movies = result.data.movies;
                    if (movies.length > 0) {
                        container.innerHTML = movies.map(movie => renderMovieCard(movie)).join('');
                    } else {
                        container.innerHTML = '<div class="col-12 text-center py-4 text-muted">暂无电影数据，请先添加电影</div>';
                    }
                } else {
                    showError('personal-recommendations', result.message || '加载失败');
                }
            } catch (error) {
                showError('personal-recommendations', '网络错误，请确保后端服务已启动');
            }
        }

        // 加载热门电影（调用真实API）
        async function loadHotMovies() {
            const container = document.getElementById('hot-movies');
            showLoading('hot-movies');
            
            try {
                const result = await movieAPI.getHot(6);
                
                if (result.code === 200 && result.data) {
                    const movies = result.data;
                    if (movies.length > 0) {
                        container.innerHTML = movies.map((movie, index) => `
                            <div class="col-xl-2 col-lg-3 col-md-4 col-sm-6">
                                <div class="card movie-card">
                                    <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
                                        ${index + 1}
                                    </span>
                                    <img src="${movie.poster || 'https://via.placeholder.com/300x450?text=No+Image'}" class="card-img-top" alt="${movie.title}" onerror="this.src='https://via.placeholder.com/300x450?text=No+Image'">
                                    <div class="card-body p-2">
                                        <h6 class="card-title mb-0">${movie.title}</h6>
                                        <small class="text-muted">${movie.Genres ? movie.Genres.map(g => g.name).join('/') : ''}</small>
                                    </div>
                                </div>
                            </div>
                        `).join('');
                    } else {
                        container.innerHTML = '<div class="col-12 text-center py-4 text-muted">暂无热门电影数据</div>';
                    }
                } else {
                    showError('hot-movies', result.message || '加载失败');
                }
            } catch (error) {
                showError('hot-movies', '网络错误，请确保后端服务已启动');
            }
        }

        // 加载分类电影
        async function loadMoviesByGenre() {
            // 加载科幻电影
            await loadGenreMovies('sci-fi-movies', '科幻');
            // 加载动作电影
            await loadGenreMovies('action-movies', '动作');
            // 加载喜剧电影
            await loadGenreMovies('comedy-movies', '喜剧');
        }

        // 加载指定分类的电影
        async function loadGenreMovies(containerId, genreName) {
            const container = document.getElementById(containerId);
            
            try {
                const result = await movieAPI.getList({ genre: genreName, page: 1, limit: 4 });
                
                if (result.code === 200 && result.data && result.data.movies) {
                    const movies = result.data.movies;
                    if (movies.length > 0) {
                        container.innerHTML = movies.map(movie => renderMovieCard(movie)).join('');
                    } else {
                        container.innerHTML = '<div class="col-12 text-center py-4 text-muted">暂无该分类电影</div>';
                    }
                } else {
                    container.innerHTML = '<div class="col-12 text-center py-4 text-muted">加载失败</div>';
                }
            } catch (error) {
                container.innerHTML = '<div class="col-12 text-center py-4 text-muted">网络错误</div>';
            }
        }

        // 显示电影详情
        async function showMovieDetail(movieId) {
            try {
                const result = await movieAPI.getDetail(movieId);
                
                if (result.code === 200 && result.data) {
                    const movie = result.data;
                    const rating = movie.rating || 0;
                    const stars = generateStars(rating);
                    const genres = movie.Genres ? movie.Genres.map(g => `<span class="badge bg-secondary me-1">${g.name}</span>`).join('') : '';
                    const year = movie.release_date ? new Date(movie.release_date).getFullYear() : '未知';
                    
                    document.getElementById('movieDetailModalLabel').textContent = movie.title;
                    document.getElementById('movie-detail-content').innerHTML = `
                        <div class="row">
                            <div class="col-md-4">
                                <img src="${movie.poster || 'https://via.placeholder.com/300x450?text=No+Image'}" class="img-fluid rounded" alt="${movie.title}" onerror="this.src='https://via.placeholder.com/300x450?text=No+Image'">
                            </div>
                            <div class="col-md-8">
                                <h4>${movie.title} (${year})</h4>
                                <div class="rating-stars mb-2">
                                    ${stars}
                                    <span class="ms-1">${rating.toFixed(1)}</span>
                                </div>
                                <p class="mb-2"><strong>导演:</strong> ${movie.director || '未知'}</p>
                                <p class="mb-2"><strong>类型:</strong> ${genres || '未知'}</p>
                                <p class="mb-2"><strong>时长:</strong> ${movie.duration ? movie.duration + '分钟' : '未知'}</p>
                                <p class="mb-2"><strong>观看次数:</strong> ${movie.view_count || 0}</p>
                                <p><strong>简介:</strong> ${movie.description || '暂无简介'}</p>
                            </div>
                        </div>
                    `;
                    
                    const movieModal = new bootstrap.Modal(document.getElementById('movieDetailModal'));
                    movieModal.show();
                } else {
                    alert(result.message || '获取电影详情失败');
                }
            } catch (error) {
                alert('网络错误，请检查后端服务');
            }
        }

        // 收藏/取消收藏电影
        async function toggleFavorite(movieId, button) {
            const token = localStorage.getItem('token');
            if (!token) {
                alert('请先登录');
                window.location.href = 'frontend/login.html';
                return;
            }
            
            try {
                const checkResult = await watchAPI.checkFavorite(movieId);
                
                if (checkResult.code === 200) {
                    let result;
                    if (checkResult.data && checkResult.data.isFavorite) {
                        result = await watchAPI.removeFavorite(movieId);
                        if (result.code === 200) {
                            button.innerHTML = '<i class="bi bi-bookmark"></i>';
                            button.classList.remove('btn-warning');
                            button.classList.add('btn-outline-secondary');
                            alert('已取消收藏');
                        }
                    } else {
                        result = await watchAPI.addFavorite(movieId);
                        if (result.code === 200) {
                            button.innerHTML = '<i class="bi bi-bookmark-fill"></i>';
                            button.classList.remove('btn-outline-secondary');
                            button.classList.add('btn-warning');
                            alert('收藏成功');
                        }
                    }
                    
                    if (result && result.code !== 200) {
                        alert(result.message || '操作失败');
                    }
                }
            } catch (error) {
                alert('网络错误');
            }
        }

        // 搜索电影
        async function searchMovies(keyword) {
            const container = document.getElementById('personal-recommendations');
            showLoading('personal-recommendations');
            
            try {
                const result = await movieAPI.getList({ keyword: keyword, page: 1, limit: 12 });
                
                if (result.code === 200 && result.data && result.data.movies) {
                    const movies = result.data.movies;
                    if (movies.length > 0) {
                        container.innerHTML = movies.map(movie => renderMovieCard(movie)).join('');
                    } else {
                        container.innerHTML = '<div class="col-12 text-center py-4 text-muted">未找到相关电影</div>';
                    }
                } else {
                    showError('personal-recommendations', result.message || '搜索失败');
                }
            } catch (error) {
                showError('personal-recommendations', '网络错误');
            }
        }

        // 更新导航栏用户状态
        function updateNavbarUser() {
            const token = localStorage.getItem('token');
            const userStr = localStorage.getItem('user');
            const userInfo = document.getElementById('nav-user-info');
            const logoutBtn = document.getElementById('nav-logout-btn');
            const loginBtn = document.getElementById('nav-login-btn');
            
            if (token && userStr) {
                const user = JSON.parse(userStr);
                userInfo.textContent = `欢迎, ${user.nickname || user.username}`;
                logoutBtn.style.display = 'inline-block';
                loginBtn.style.display = 'none';
            } else {
                userInfo.textContent = '';
                logoutBtn.style.display = 'none';
                loginBtn.style.display = 'inline-block';
            }
        }

        // 初始化页面
        document.addEventListener('DOMContentLoaded', function() {
            // 更新导航栏用户状态
            updateNavbarUser();
            
            loadPersonalRecommendations();
            loadHotMovies();
            loadMoviesByGenre();
            
            // 退出登录
            document.getElementById('nav-logout-btn').addEventListener('click', function() {
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                updateNavbarUser();
                showMessage('已退出登录', 'info');
            });
            
            // 添加查看详情事件监听
            document.addEventListener('click', function(e) {
                if (e.target.classList.contains('view-detail') || e.target.closest('.view-detail')) {
                    e.preventDefault();
                    const movieId = parseInt(e.target.closest('.view-detail').getAttribute('data-movie-id'));
                    showMovieDetail(movieId);
                }
                
                // 收藏按钮事件
                if (e.target.classList.contains('favorite-btn') || e.target.closest('.favorite-btn')) {
                    e.preventDefault();
                    const button = e.target.classList.contains('favorite-btn') ? e.target : e.target.closest('.favorite-btn');
                    const movieId = parseInt(button.getAttribute('data-movie-id'));
                    toggleFavorite(movieId, button);
                }
                
                // 重试按钮事件
                if (e.target.classList.contains('retry-btn')) {
                    loadPersonalRecommendations();
                    loadHotMovies();
                    loadMoviesByGenre();
                }
            });
            
            // 添加筛选按钮事件监听
            document.querySelectorAll('.filter-btn').forEach(button => {
                button.addEventListener('click', async function() {
                    const genre = this.getAttribute('data-genre');
                    if (genre === 'all') {
                        await loadPersonalRecommendations();
                    } else {
                        const genreMap = {
                            'action': '动作',
                            'comedy': '喜剧',
                            'sci-fi': '科幻',
                            'drama': '剧情',
                            'horror': '恐怖'
                        };
                        const genreName = genreMap[genre] || genre;
                        const container = document.getElementById('personal-recommendations');
                        showLoading('personal-recommendations');
                        
                        try {
                            const result = await movieAPI.getList({ genre: genreName, page: 1, limit: 8 });
                            if (result.code === 200 && result.data && result.data.movies) {
                                const movies = result.data.movies;
                                if (movies.length > 0) {
                                    container.innerHTML = movies.map(movie => renderMovieCard(movie)).join('');
                                } else {
                                    container.innerHTML = '<div class="col-12 text-center py-4 text-muted">该分类暂无电影</div>';
                                }
                            }
                        } catch (error) {
                            showError('personal-recommendations', '网络错误');
                        }
                    }
                });
            });
            
            // 搜索功能
            document.getElementById('search-button').addEventListener('click', function() {
                const searchTerm = document.getElementById('search-input').value.trim();
                if (searchTerm) {
                    searchMovies(searchTerm);
                }
            });
            
            // 回车搜索
            document.getElementById('search-input').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    const searchTerm = this.value.trim();
                    if (searchTerm) {
                        searchMovies(searchTerm);
                    }
                }
            });
        });
    </script>
</body>
</html>
